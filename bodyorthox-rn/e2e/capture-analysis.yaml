# Parcours E2E natif : login → création patient IN-APP → import galerie →
# analyse HKA on-device → sauvegarde. Mode on-device pur : les patients vivent
# dans le SQLite local de l'appareil — plus de seed patient côté API, le flow
# crée « Vitruve Test » dans l'app (ré-exécution : le picker retombe sur la
# fiche existante si le patient est déjà là).
# Prérequis : API locale pour le LOGIN uniquement (services/bodyorthox-api,
# PORT=3002, npm run seed → compte ortho), Metro lancé, photo de test dans la
# galerie du simulateur (simctl addmedia).
# Lancer : maestro test e2e/capture-analysis.yaml
appId: com.bodyorthox.app
---
- launchApp
# Premier lancement : Metro peut bundler 1-2 min avant d'afficher l'UI
- extendedWaitUntil:
    visible: "Se connecter|Patients|Accueil|Passer"
    timeout: 120000
- runFlow:
    when:
      visible:
        id: "login-email"
    commands:
      - tapOn:
          id: "login-email"
      - inputText: "ortho@antidotesport.local"
      - tapOn:
          id: "login-password"
      - inputText: "ChangeMe456!"
      # Android : le clavier recouvre le bouton (hideKeyboard échoue sur iOS
      # mais y est inutile, le bouton reste visible)
      - runFlow:
          when:
            platform: Android
          commands:
            - hideKeyboard
      - tapOn:
          id: "login-submit"
# iOS peut proposer d'enregistrer le mot de passe dans le trousseau
- runFlow:
    when:
      visible: "Enregistrer le mot de passe ?"
    commands:
      - tapOn: "Plus tard"
# L'onboarding peut apparaître au premier login ; « Passer » peut nécessiter
# plusieurs tentatives le temps que l'écran soit interactif.
- waitForAnimationToEnd
- repeat:
    while:
      visible:
        id: "onboarding-skip"
    commands:
      - tapOn:
          id: "onboarding-skip"
      - waitForAnimationToEnd
# Le dialogue trousseau peut apparaître avec retard (course avec le premier
# check ci-dessus) : re-tenter la fermeture juste avant d'asserter l'accueil.
- runFlow:
    when:
      visible: "Enregistrer le mot de passe ?"
    commands:
      - tapOn: "Plus tard"
- extendedWaitUntil:
    visible: "Patients"
    timeout: 15000
- takeScreenshot: e2e/shots/01-apres-login
- tapOn: "Patients"
# Base locale vierge au premier run : créer le patient dans l'app.
# Si le patient existe déjà (run précédent), sauter la création.
- runFlow:
    when:
      notVisible: "Vitruve.*"
    commands:
      - tapOn: "Nouveau patient"
      - tapOn:
          id: "np-first-name"
      - inputText: "Vitruve"
      - tapOn:
          id: "np-last-name"
      - inputText: "Test"
      - tapOn:
          id: "np-sex"
      - tapOn: "Homme"
      - tapOn:
          id: "np-dob"
      - inputText: "01011990"
      - runFlow:
          when:
            platform: Android
          commands:
            - hideKeyboard
      # Les 3 consentements RGPD sont requis (sous le pli → scroll)
      - scrollUntilVisible:
          element:
            id: "np-consent-0"
      - tapOn:
          id: "np-consent-0"
      - tapOn:
          id: "np-consent-1"
      - tapOn:
          id: "np-consent-2"
      - scrollUntilVisible:
          element:
            id: "np-submit-secondary"
      # « Enregistrer sans capturer » → fiche patient (préserve les étapes
      # suivantes du parcours : fiche → Nouvelle capture)
      - tapOn:
          id: "np-submit-secondary"
- extendedWaitUntil:
    visible: "Vitruve.*"
    timeout: 10000
# Premier run : la création atterrit déjà sur la fiche ; re-run : on y entre
# depuis la liste. Le CTA « Nouvelle capture » n'existe que sur la fiche.
- runFlow:
    when:
      notVisible: "Nouvelle capture"
    commands:
      - tapOn: "Vitruve.*"
- takeScreenshot: e2e/shots/02-fiche-patient
- tapOn: "Nouvelle capture"
- takeScreenshot: e2e/shots/03-ecran-capture
- tapOn:
    id: "native-gallery-button"
# PHPicker (process système) : la première photo de la grille
- extendedWaitUntil:
    visible: "Photos|Récents|Recents|All Photos"
    timeout: 10000
- tapOn:
    point: "13%,30%"
- extendedWaitUntil:
    visible:
      id: "analyze-button"
    timeout: 15000
- takeScreenshot: e2e/shots/04-preview
- tapOn:
    id: "analyze-button"
# Détection heavy+full on-device (émulateur/simulateur = CPU, avec sur
# Android un éventuel rechargement des modèles après échec GPU : long)
- extendedWaitUntil:
    visible:
      id: "bilateral-section"
    timeout: 300000
- takeScreenshot: e2e/shots/05-analyse-hka
- tapOn:
    id: "save-analysis-button"
# Processing v2 auto-avance vers Résultats
- extendedWaitUntil:
    visible: "Générer le rapport PDF"
    timeout: 30000
- takeScreenshot: e2e/shots/06-resultats
