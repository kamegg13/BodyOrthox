<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Capture Photo HKA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-blue: #1B6FBF;
            --ios-gray: #8E8E93;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .camera-viewfinder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2c2c2c, #1a1a1a);
            z-index: -1;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .btn-shadow {
            box-shadow: 0 4px 12px rgba(27, 111, 191, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col h-screen">
<div class="camera-viewfinder"></div>
<header class="fixed top-0 left-0 w-full z-50 bg-black/40 backdrop-blur-md py-3 px-4 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-white text-[14px]">lock</span>
<span class="text-white text-[11px] font-medium tracking-tight">Données enregistrées uniquement sur votre appareil</span>
</header>
<main class="flex-grow flex items-center justify-center p-8">
<div class="glass-card rounded-[28px] p-8 w-full max-w-[280px] flex flex-col items-center text-center shadow-2xl">
<div class="mb-6">
<span class="material-symbols-outlined text-black/80 text-[80px]">accessibility_new</span>
</div>
<h2 class="text-black text-[17px] font-semibold leading-tight mb-2">
                Placez le patient debout,<br/>face à vous
            </h2>
<p class="text-[var(--ios-gray)] text-[14px] font-normal">
                Corps entier visible dans le cadre
            </p>
</div>
</main>
<footer class="bg-white w-full px-6 pt-8 pb-10 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
<div class="max-w-md mx-auto flex flex-col items-center">
<button class="bg-[var(--primary-blue)] w-full h-[52px] rounded-[14px] flex items-center justify-center space-x-3 active:opacity-80 transition-opacity btn-shadow">
<span class="material-symbols-outlined text-white text-[24px]">photo_camera</span>
<span class="text-white text-[17px] font-semibold">Prendre une photo</span>
</button>
<p class="mt-4 text-[var(--ios-gray)] text-[13px] font-normal">
                L'analyse HKA démarre automatiquement
            </p>
<div class="h-2 mt-4"></div>
</div>
</footer>

</body></html>
