<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1b70c0",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .ios-shadow {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full max-w-[430px] mx-auto flex-col bg-white dark:bg-background-dark overflow-x-hidden p-6">
<!-- Page Indicators (1 of 3) -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2 w-2 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Illustration Center -->
<div class="flex flex-1 items-center justify-center py-8">
<div class="relative w-full aspect-[4/5] flex items-center justify-center">
<!-- Mockup representing the iPhone medical illustration -->
<div class="relative w-64 h-[500px] bg-slate-900 rounded-[3rem] border-[6px] border-slate-800 p-2 overflow-hidden shadow-2xl">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-2xl z-10"></div>
<div class="w-full h-full bg-slate-100 rounded-[2.2rem] overflow-hidden relative">
<!-- Simulated AI Analysis Overlay -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Silhouette of a person walking for gait analysis" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCuXtAh6SIa7jmKnuWff6ANIzNMCcu7tygjE7-o8kK4WdjgjJj1Vck22FxEb7snuXPihBDMB_lCF-szT0G2ZWO9l-JyciPnLWNNTFctf_mIoMNRe8LjDkp4KtHCjLs0Ie3sN-qcwQvj4RK6VDIFyaw9ZvPSUMGVkC62elwvZ7xt27xIHQZhnYfa-5jz89MypKKhLDXA6_wXDZbPkw2rRkTs2-0Yw3GMIjrewt2p1AQWLEXqf1Xi88IYxXkGFFpgmd0IYcJiLAekl0c')"></div>
<!-- Analysis Graphics (Simplified UI overlays) -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Knee Angle -->
<div class="absolute top-1/2 left-1/3 flex flex-col items-center">
<div class="w-12 h-12 border-2 border-primary rounded-full flex items-center justify-center bg-white/80 backdrop-blur-sm">
<span class="text-xs font-bold text-primary">89°</span>
</div>
</div>
<!-- Ankle Angle -->
<div class="absolute bottom-1/4 left-1/4 flex flex-col items-center">
<div class="w-12 h-12 border-2 border-orange-500 rounded-full flex items-center justify-center bg-white/80 backdrop-blur-sm">
<span class="text-xs font-bold text-orange-600">42°</span>
</div>
</div>
<!-- Skeleton lines simulation -->
<svg class="absolute inset-0 w-full h-full opacity-60" viewbox="0 0 100 200">
<line stroke="#1b70c0" stroke-width="2" x1="40" x2="35" y1="80" y2="120"></line>
<line stroke="#f97316" stroke-width="2" x1="35" x2="30" y1="120" y2="160"></line>
</svg>
</div>
</div>
</div>
</div>
</div>
<!-- Copy Text -->
<div class="text-center space-y-4 px-2 mb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-[32px] font-bold leading-tight tracking-tight">
                Vos analyses, en 30 secondes
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-[17px] font-normal leading-relaxed">
                Filmez la marche de votre patient. Les angles articulaires s'affichent instantanément.
            </p>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 w-full pt-2 pb-6">
<button class="flex w-full h-[56px] items-center justify-center bg-primary text-white text-[17px] font-semibold rounded-xl hover:opacity-90 transition-opacity">
<span>Commencer</span>
</button>
<button class="flex w-full items-center justify-center py-2 text-slate-400 dark:text-slate-500 text-[15px] font-medium hover:text-slate-600 transition-colors">
                Passer l'introduction
            </button>
</div>
</div>
</body></html>
