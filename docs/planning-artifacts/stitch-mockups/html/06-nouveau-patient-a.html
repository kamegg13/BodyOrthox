<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1b70c0",
                        "background-light": "#f2f2f7",
                        "background-dark": "#111921",
                        "ios-gray": "#8E8E93",
                        "ios-separator": "#C6C6C8",
                        "ios-disabled": "#C7C7CC",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "12px",
                        "3xl": "14px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<!-- iOS Status Bar Placeholder -->
<div class="h-11 w-full bg-white/80 dark:bg-background-dark/80 ios-blur sticky top-0 z-50">
<div class="flex justify-between items-center px-6 h-full text-[13px] font-semibold">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
</div>
<!-- Cupertino Navigation Bar -->
<nav class="sticky top-11 z-50 bg-white/80 dark:bg-background-dark/80 ios-blur border-b border-ios-separator/30 h-11 flex items-center justify-between px-4">
<button class="text-ios-gray text-[17px] font-normal hover:opacity-70 transition-opacity">Annuler</button>
<h1 class="text-slate-900 dark:text-slate-100 text-[17px] font-semibold">Nouveau patient</h1>
<button class="text-primary/50 text-[17px] font-semibold cursor-default">Créer</button>
</nav>
<main class="max-w-[600px] mx-auto pt-8 px-4 pb-12">
<!-- Section Header -->
<header class="px-4 mb-2">
<h2 class="text-ios-gray text-[13px] uppercase font-normal tracking-wide">Informations patient</h2>
</header>
<!-- Form Section: Grouped iOS Style -->
<div class="bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm border border-ios-separator/10">
<!-- Row 1: Prénom -->
<div class="flex items-center min-h-[44px] px-4">
<label class="text-slate-900 dark:text-slate-100 text-[17px] w-32 shrink-0">Prénom</label>
<input class="flex-1 border-none focus:ring-0 text-[17px] bg-transparent text-slate-900 dark:text-slate-100 placeholder:text-ios-gray/50 py-3 px-0" placeholder="Entrer le prénom" type="text"/>
</div>
<div class="ml-4 border-b border-ios-separator/30"></div>
<!-- Row 2: Nom -->
<div class="flex items-center min-h-[44px] px-4">
<label class="text-slate-900 dark:text-slate-100 text-[17px] w-32 shrink-0">Nom</label>
<input class="flex-1 border-none focus:ring-0 text-[17px] bg-transparent text-slate-900 dark:text-slate-100 placeholder:text-ios-gray/50 py-3 px-0" placeholder="Entrer le nom" type="text"/>
</div>
<div class="ml-4 border-b border-ios-separator/30"></div>
<!-- Row 3: Date de naissance -->
<div class="flex items-center min-h-[44px] px-4">
<label class="text-slate-900 dark:text-slate-100 text-[17px] w-48 shrink-0">Date de naissance</label>
<div class="flex-1 flex justify-end items-center">
<span class="text-ios-gray text-[17px]">JJ/MM/AAAA</span>
<span class="material-symbols-outlined text-ios-gray/40 ml-2 text-[20px]">calendar_today</span>
</div>
</div>
</div>
<!-- Helper Text -->
<p class="px-4 mt-2 text-ios-gray text-[13px] leading-tight">
            Ces informations sont stockées uniquement sur cet appareil.
        </p>
<!-- Gap -->
<div class="h-10"></div>
<!-- CTA Button (Disabled State) -->
<div class="px-0">
<button class="w-full h-[56px] bg-ios-disabled rounded-3xl text-white text-[17px] font-semibold flex items-center justify-center cursor-not-allowed" disabled="">
                Créer le patient
            </button>
</div>
<!-- Footer / Illustration Placeholder -->
<div class="mt-12 flex flex-col items-center justify-center opacity-40 grayscale">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl">person_add</span>
</div>
<p class="text-ios-gray text-sm text-center">Complétez le formulaire pour commencer<br/>le suivi BodyOrthox</p>
</div>
</main>
<!-- iOS Home Indicator -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-black/20 dark:bg-white/20 rounded-full"></div>
</body></html>
