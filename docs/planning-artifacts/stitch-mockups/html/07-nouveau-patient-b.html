<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BodyOrthox - Nouveau Patient</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1b70c0",
                        "background-light": "#f2f2f7",
                        "background-dark": "#111921",
                        "ios-gray": "#8E8E93",
                        "ios-disabled": "#C7C7CC",
                        "ios-border": "#C6C6C8"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "12px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col max-w-[480px] mx-auto bg-background-light dark:bg-background-dark">
<!-- Navigation Bar -->
<header class="sticky top-0 z-10 flex h-14 w-full items-center justify-between border-b border-ios-border/30 bg-white/80 backdrop-blur-md px-4 dark:bg-background-dark/80">
<button class="text-[17px] font-normal text-ios-gray">Annuler</button>
<h1 class="text-[17px] font-semibold text-slate-900 dark:text-slate-100">Nouveau patient</h1>
<button class="text-[17px] font-semibold text-primary/50 cursor-not-allowed">Créer</button>
</header>
<main class="flex flex-col gap-8 p-4 pt-6">
<!-- Information Section -->
<section class="flex flex-col gap-1">
<h3 class="px-4 pb-2 text-[13px] uppercase tracking-wide text-ios-gray">Informations personnelles</h3>
<div class="overflow-hidden rounded-2xl bg-white dark:bg-slate-800">
<!-- Row: Prénom -->
<div class="flex items-center px-4 py-3 border-b border-slate-100 dark:border-slate-700">
<label class="w-32 text-[17px] text-slate-900 dark:text-slate-100" for="firstname">Prénom</label>
<input class="flex-1 border-none bg-transparent p-0 text-[17px] placeholder-ios-disabled focus:ring-0 dark:text-slate-100" id="firstname" placeholder="Prénom" type="text"/>
</div>
<!-- Row: Nom -->
<div class="flex items-center px-4 py-3 border-b border-slate-100 dark:border-slate-700">
<label class="w-32 text-[17px] text-slate-900 dark:text-slate-100" for="lastname">Nom</label>
<input class="flex-1 border-none bg-transparent p-0 text-[17px] placeholder-ios-disabled focus:ring-0 dark:text-slate-100" id="lastname" placeholder="Nom" type="text"/>
</div>
<!-- Row: Date de naissance -->
<div class="flex items-center px-4 py-3">
<label class="w-32 text-[17px] text-slate-900 dark:text-slate-100" for="dob">Naissance</label>
<input class="flex-1 border-none bg-transparent p-0 text-[17px] placeholder-ios-disabled focus:ring-0 dark:text-slate-100" id="dob" placeholder="JJ/MM/AAAA" type="text"/>
</div>
</div>
<p class="px-4 pt-2 text-[13px] leading-relaxed text-ios-gray">
                    Ces informations sont stockées uniquement sur cet appareil.
                </p>
</section>
<!-- Decorative App Branding -->
<div class="flex flex-col items-center justify-center py-4 opacity-20">
<div class="mb-2 flex h-16 w-16 items-center justify-center rounded-2xl bg-primary">
<span class="material-symbols-outlined text-4xl text-white">person_add</span>
</div>
<span class="text-xs font-bold uppercase tracking-[0.2em] text-slate-900 dark:text-white">BodyOrthox</span>
</div>
</main>
<!-- Footer CTA -->
<footer class="mt-auto p-4 pb-10">
<button class="flex h-[50px] w-full items-center justify-center rounded-2xl bg-ios-disabled text-[17px] font-bold text-white transition-colors" disabled="">
                Créer le patient
            </button>
</footer>
<!-- iOS Home Indicator simulation -->
<div class="fixed bottom-1 left-1/2 h-1 w-32 -translate-x-1/2 rounded-full bg-slate-300/50 dark:bg-slate-700/50"></div>
</div>
</body></html>
