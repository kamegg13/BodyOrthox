name: bodyorthox
description: "BodyOrthox — Analyse biomécanique on-device pour orthopédistes"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Database + Chiffrement AES-256
  # sqlcipher_flutter_libs 0.7.0 est la dernière version disponible (marquée EOL).
  # La stratégie d'intégration complète (NativeDatabase + PRAGMA key) est en Story 1.3.
  # sqlite3_flutter_libs est exclu via dependency_overrides (incompatible avec sqlcipher).
  drift: ^2.31.0
  sqlcipher_flutter_libs: ^0.7.0

  # Annotations (@visibleForTesting, etc.)
  meta: ^1.16.0

  # Modèles immutables
  freezed_annotation: ^3.1.0

  # Keychain iOS (stockage clé SQLCipher)
  flutter_secure_storage: ^10.0.0

  # Notifications locales
  flutter_local_notifications: ^20.1.0

  # State management
  flutter_riverpod: ^3.2.1

  # Biométrie
  local_auth: ^3.0.1

  # PDF generation
  pdf: ^3.11.3

  # Monétisation
  purchases_flutter: ^9.13.0

  # Routing
  go_router: ^17.1.0

  # Graphes cliniques (Story 2.4)
  fl_chart: ^0.69.0

  # Annotations Riverpod
  riverpod_annotation: ^4.0.2

  # UUID v4 pour les IDs entités
  uuid: ^4.5.3

  # Chemin vers le répertoire documents de l'app (stockage de la DB)
  path_provider: ^2.1.5

  # Utilitaires de manipulation de chemins de fichiers
  path: ^1.9.1
  camera: ^0.12.0
  cross_file: ^0.3.5
  permission_handler: ^12.0.1

  # ML on-device — activé Story 3.3 (AC1, AC2, AC3)
  google_mlkit_pose_detection: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  go_router_builder: ^4.2.0

  # Linting
  flutter_lints: ^4.0.0

  # Tests
  mocktail: ^1.0.4
  # riverpod_test incompatible avec riverpod 3.x — utiliser mocktail + ProviderContainer directement

  riverpod_generator: ^4.0.3

# ⚠️ INCOMPATIBILITÉ CRITIQUE — sqlite3_flutter_libs et sqlcipher_flutter_libs
# sont mutuellement exclusifs. drift inclut sqlite3_flutter_libs comme dépendance
# transitive → on doit l'exclure explicitement via le stub local.
# sqlcipher_flutter_libs fournit sa propre implémentation SQLite chiffrée (AES-256).
# Sans cette exclusion, le build iOS échoue avec des symboles en double.
dependency_overrides:
  sqlite3_flutter_libs:
    path: ./local_packages/sqlite3_flutter_libs_stub

flutter:
  uses-material-design: true
