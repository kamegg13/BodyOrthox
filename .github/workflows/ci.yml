name: CI – Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests unitaires (227 tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bodyorthox-rn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bodyorthox-rn/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --ci --forceExit

      - name: Coverage report
        run: npm run test:coverage -- --ci --forceExit
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: bodyorthox-rn/coverage/
          retention-days: 14
