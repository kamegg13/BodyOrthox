name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    # Image Docker officielle React Native avec Java + Android SDK déjà installés
    container:
      image: reactnativecommunity/react-native-android:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: bodyorthox-rn/node_modules
          key: node-${{ hashFiles('bodyorthox-rn/package-lock.json') }}
          restore-keys: node-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('bodyorthox-rn/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Install dependencies
        working-directory: bodyorthox-rn
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: bodyorthox-rn
        run: npm test -- --ci --forceExit

      - name: Build release APK
        working-directory: bodyorthox-rn/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bodyorthox-${{ github.ref_name }}-${{ github.sha }}
          path: bodyorthox-rn/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bodyorthox-rn/android/app/build/outputs/apk/release/app-release*.apk
          name: "BodyOrthox ${{ github.ref_name }}"
          body: |
            ## BodyOrthox ${{ github.ref_name }}

            ### Installation Android
            1. Télécharger `app-release.apk` ci-dessous
            2. Sur votre Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvrir le fichier APK et installer
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
