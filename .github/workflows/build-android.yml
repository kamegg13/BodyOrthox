name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bodyorthox-rn/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        working-directory: bodyorthox-rn
        run: npm ci --legacy-peer-deps

      - name: Run tests before build
        working-directory: bodyorthox-rn
        run: npm test -- --ci --forceExit

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('bodyorthox-rn/android/**/*.gradle*', 'bodyorthox-rn/android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make Gradle wrapper executable
        working-directory: bodyorthox-rn/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: bodyorthox-rn/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bodyorthox-android-${{ github.sha }}
          path: bodyorthox-rn/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      # Create a GitHub Release on tag push with the APK attached
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bodyorthox-rn/android/app/build/outputs/apk/release/app-release*.apk
          name: "BodyOrthox ${{ github.ref_name }}"
          body: |
            ## BodyOrthox ${{ github.ref_name }}

            ### Installation Android
            1. Télécharger `app-release.apk` ci-dessous
            2. Sur votre Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvrir le fichier APK et installer

            ### Changements
            Voir les commits depuis la dernière version.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
