name: Trigger Deployment

on:
  workflow_dispatch: # Déclenchement manuel
  push:
    branches:
      - main
    paths:
      - 'bodyorthox-rn/**'
      - '.github/workflows/deploy.yml'

jobs:
  trigger-deployment:
    runs-on: ubuntu-latest
    name: Trigger centralized deployment

    steps:
      - name: Trigger deployment repository
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/kamegg13/orthopedist_gen_ai-deployment/dispatches \
            -d '{"event_type":"deploy-bodyorthox"}'

          echo "✅ Déploiement déclenché sur orthopedist_gen_ai-deployment"
          echo "📊 Voir le statut : https://github.com/kamegg13/orthopedist_gen_ai-deployment/actions"
