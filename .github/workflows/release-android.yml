name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bodyorthox-rn

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bodyorthox-rn/package-lock.json

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --ci --passWithNoTests --testTimeout=30000

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          cd android/gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip "gradle-8.11.1/lib/gradle-launcher-*.jar" -d /tmp
          # Extract the wrapper jar from the distribution
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" -o gradle-wrapper.jar || true
          # If direct download fails, generate it
          if [ ! -s gradle-wrapper.jar ]; then
            cd /tmp
            unzip -q -o gradle.zip
            /tmp/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1 --project-dir /tmp/wrapper-gen 2>/dev/null || true
            if [ -f /tmp/wrapper-gen/gradle/wrapper/gradle-wrapper.jar ]; then
              cp /tmp/wrapper-gen/gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/bodyorthox-rn/android/gradle/wrapper/gradle-wrapper.jar
            fi
          fi

      - name: Generate Gradle wrapper if needed
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            # Use system gradle to generate wrapper with correct version
            gradle wrapper --gradle-version 8.11.1 --no-daemon 2>/dev/null || true
          fi
          chmod +x gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp android/app/build/outputs/apk/debug/app-debug.apk ./BodyOrthox-${VERSION}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyOrthox-APK
          path: bodyorthox-rn/BodyOrthox-*-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bodyorthox-rn/BodyOrthox-*-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
