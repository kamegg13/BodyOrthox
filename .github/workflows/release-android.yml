name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bodyorthox-rn

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bodyorthox-rn/package-lock.json

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --ci --passWithNoTests --testTimeout=30000

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          cd android
          # Create wrapper using system gradle (node_modules must exist first)
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --warning-mode=all
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp android/app/build/outputs/apk/debug/app-debug.apk ./BodyOrthox-${VERSION}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyOrthox-APK
          path: bodyorthox-rn/BodyOrthox-*-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bodyorthox-rn/BodyOrthox-*-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
