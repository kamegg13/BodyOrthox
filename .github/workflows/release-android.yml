name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bodyorthox-rn

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bodyorthox-rn/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.11.1

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --ci --passWithNoTests

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp android/app/build/outputs/apk/debug/app-debug.apk ./BodyOrthox-${VERSION}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyOrthox-APK
          path: bodyorthox-rn/BodyOrthox-*-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bodyorthox-rn/BodyOrthox-*-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
